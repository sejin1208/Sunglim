kind = "web"
previewPath = "/"
title = "성림교구 웹사이트"
version = "1.0.0"
id = "artifacts/sunglim"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21571
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/sunglim run dev"

[services.env]
PORT = "21571"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/sunglim", "run", "build"]
publicDir = "artifacts/sunglim/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
