openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: 성림교구 API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contact
    description: Contact form operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit contact form
      description: Submit a contact/inquiry form from customers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequest"
      responses:
        "201":
          description: Contact form submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /contact/list:
    get:
      operationId: listContacts
      tags: [contact]
      summary: List all contact submissions
      description: Get all submitted contact inquiries
      responses:
        "200":
          description: List of contact inquiries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactItem"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ContactRequest:
      type: object
      properties:
        name:
          type: string
          description: Customer name
        company:
          type: string
          description: Company name
        phone:
          type: string
          description: Phone number
        email:
          type: string
          description: Email address
        subject:
          type: string
          description: Inquiry subject
        message:
          type: string
          description: Inquiry message
      required:
        - name
        - phone
        - subject
        - message
    ContactResponse:
      type: object
      properties:
        id:
          type: integer
        message:
          type: string
      required:
        - id
        - message
    ContactItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        company:
          type: string
        phone:
          type: string
        email:
          type: string
        subject:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - phone
        - subject
        - message
        - createdAt
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
